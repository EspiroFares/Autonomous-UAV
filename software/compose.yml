services:
  ros2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drone_ros2
    tty: true
    stdin_open: true
    working_dir: /workspaces/drone_ws
    privileged: true
    devices:
      - /dev/ttyAMA5:/dev/ttyAMA5
    volumes:
      - ./drone_ws:/workspaces/drone_ws
    ports:
      - "14550:14550/udp"
      - "14555:14555/udp"
